# SMTP configuration
smtp:
  enabled: false
  # Secret containing SMTP credentials used by the application.
  # The referenced Kubernetes Secret must exist and include the following keys:
  # - SMTP_ADDRESS: SMTP server hostname (e.g. "smtp.example.com")
  # - SMTP_DOMAIN: HELO/EHLO domain to use (e.g. "example.com")
  # - SMTP_PORT: SMTP server port (e.g. "587")
  # - SMTP_USER_NAME: Username for SMTP authentication (Using AWS SES this will be the AWS Access Key ID for the smtp user)
  # - SMTP_PASSWORD: Password for SMTP authentication (Using AWS SES this will be AWS Secret Access Key for the smtp user)
  # - MAILER_DEFAULT_FROM: Default "from" email address (e.g. "no-reply@example.com")
  #
  # Example: create the secret with kubectl
  # kubectl create secret generic smtp-secrets \
  #   --from-literal=SMTP_ADDRESS=smtp.example.com \
  #   --from-literal=SMTP_DOMAIN=example.com \
  #   --from-literal=SMTP_PORT=587 \
  #   --from-literal=SMTP_USER_NAME='AKIABLAHBLAHBLAH' \
  #   --from-literal=SMTP_PASSWORD='awssecretaccesskeyhere' \
  #   --from-literal=MAILER_DEFAULT_FROM="no-reply@example.com"
  secret:
    name: smtp-secrets

# Honeybadger error tracking configuration
# The application uses Honeybadger for error tracking and monitoring.
# The API key must be provided via a Kubernetes secret.
# The environment name is required and will be provided by Ad-Signal.
#
# Example: create the secret with kubectl
# kubectl create secret generic honeybadger-api-key \
#   --namespace match \
#   --from-literal=apiKey=YOUR_HONEYBADGER_API_KEY
honeybadger:
  secretName: honeybadger-api-key
  secretKey: apiKey
  environment: ""  # REQUIRED: Your Honeybadger environment name (provided by Ad-Signal)

owningUser:
  # You may create a Kubernetes secret with the owning user's credentials.
  # Set secret.generate: true to auto-generate password (requires Kubernetes cluster access)
  # Set secret.generate: false to use a pre-created secret
  # Example: create the secret with kubectl
  # kubectl create secret generic match-owning-user-credentials \
  #   --namespace match \
  #   --from-literal=password="SecurePassword123!"
  email: "admin@example.invalid"
  firstName: "Admin"
  lastName: "User"
  # It's not recommended to set a static password here
  #password: "notsecure"
  organisationName: "Example Org"
  secret:
    generate: false  # Set to true to allow Helm to generate the secret (not supported with Argo)
    name: match-owning-user-credentials # Kubernetes secret containing the owning user's credentials

# Set to true to add ArgoCD sync wave annotations instead of Helm hooks - useful when deploying via ArgoCD
useArgoSyncWaveAnnotations: false

kedaAutoScaling:
  enabled: false
  # The amount of time in seconds your cluster job pods will be allowed to continue
  # before being forcefully terminated after receiving a termination signal.
  # Use this to mitigate voluntary pod disruptions and make job recovery more reliable.
  # We do NOT recommend running the long running scaledJobs on nodes that are regularly interrupted (e.g. spot instances)
  # but setting this value correctly will help mitigate disruptions during node maintenance or scaling events.
  terminationGracePeriodSeconds: 30 # don't set this lower than 30 seconds.
  redis:
    pollingInterval: 10 # seconds
    port: 6379
    enabledTLS: true
    databaseIndex: 0
    authenticationRef:
      enabled: false # will use .Values.sidekiq.redisServerUrl for hosts if disabled
      name: keda-trigger-auth-redis
      # optionally provide host via secret referenced here
      #secretTargetRef:
      # - parameter: host
      #   name: secret-containing-redis-url
      #   key: endpoint

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
