{{- include "match.validateArgoSecretGeneration" . }}
{{- if .Values.owningUser.secret.generate }}
{{- $secretName := .Values.owningUser.secret.name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "match.labels" . | nindent 4 }}
  # Owning user credentials are used by the seed job only on first install.
  # After that they are ignored, so we don't want to re-create them
  # on helm upgrade because the password would change - but not
  # reflect what the pre-seed job set up as the original password, making the
  # credentials invalid if an operator comes back to look for the secret.
  annotations:
    helm.sh/hook: pre-install # Only create on first run
    helm.sh/hook-weight: "-1"
type: Opaque
data:
  password: {{ include "match.owningUserPassword" . | b64enc | quote }}
{{- else }}
{{/* Secret exists, validate required keys are present */}}
{{- if not (index $existingSecret.data "password") }}
{{- fail (printf "Secret %s exists but is missing required key 'password'. Please add this key to the secret." $secretName) }}
{{- end }}
{{- end }}
{{- end }}