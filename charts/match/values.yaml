# Workers: Traditional static Sidekiq worker deployments
# Only active when kedaAutoScaling.enabled is false
# Use for traditional deployments with fixed replica counts
# Each worker can consume multiple Sidekiq queues with configurable concurrency
# Workers run continuously and process jobs from their assigned queues
workers:
  generic:
    replicas: 1
    queues:
      - name: generic_queue
        priority: 1
      - name: generic_queue2
        priority: 2
    sidekiqConcurrency: 5
    sidekiqTimeout: 25
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  ingest:
    replicas: 1
    queues:
      - name: slow_queue
        priority: 1
    sidekiqConcurrency: 5
    sidekiqTimeout: 25
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  process:
    replicas: 1
    queues:
      - name: fast_queue
        priority: 1
    sidekiqConcurrency: 5
    sidekiqTimeout: 25
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  fingerprinter:
    replicas: 1
    fingerprinter:
      enabled: true
      port: 6000
      requests:
        cpu: 3
        memory: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 1Gi
    dbPoolSize: 1
    dbFollowerPoolSize: 1
    sidekiqConcurrency: 1
    sidekiqTimeout: 600
    queues:
      - name: video_match_frames_native_fingerprint_tasks
        priority: 1

# ScaledObjects: KEDA-managed long-running workers with HorizontalPodAutoscaler-like behavior
# Only active when kedaAutoScaling.enabled is true
# Use for multi-queue workers that benefit from dynamic scaling based on queue depth
# Each worker can consume multiple Sidekiq queues and will scale between min/max replicas
#
# NOTE: These are base/default configurations. Environment-specific files in environment-sizes/
# override ONLY the maxReplicaCount values using Helm's deep merge. All other settings
# (resources, queues, timeouts, etc.) remain as defined here unless explicitly overridden.
scaledObjects:
  generic:
    minReplicaCount: 1
    maxReplicaCount: 3
    sidekiqConcurrency: 10
    dbPoolSize: 10
    dbFollowerPoolSize: 10
    sidekiqTimeout: 30
    resources:
      limits:
        cpu: 300m
        memory: 1500Mi
      requests:
        cpu: 300m
        memory: 300Mi
    queues:
      - name: default
        priority: 1
      - name: pipeline
        priority: 2
      - name: mailers
        priority: 3
      - name: active_storage_purge
        priority: 4
      - name: refresh_ingest_source_reports
        priority: 5

# ScaledJobs: KEDA-managed ephemeral job pods with "one and done" pattern
# Only active when kedaAutoScaling.enabled is true
# Use for CPU-intensive or long-running tasks that benefit from dedicated pod-per-job scaling
# Each scaledJob processes ONE Sidekiq queue only (limitation: cannot handle multiple queues)
# Jobs are created on-demand when queue has items and terminated after completion
# Sidekiq concurrency is always 1 per job pod
#
# NOTE: These are base/default configurations. Environment-specific files in environment-sizes/
# override ONLY the maxReplicaCount values using Helm's deep merge. All other settings
# (resources, queues, timeouts, etc.) remain as defined here unless explicitly overridden.
scaledJobs:
  fingerprinter-video:
    enabled: true
    maxReplicaCount: 2
    resources:
      requests:
        memory: 650Mi
        cpu: "200m"
      limits:
        cpu: "500m"
        memory: 2Gi
    sideKiqQueue: video_match_frames_native_fingerprint_tasks
    activeDeadlineSeconds: 3600 # 1 hour
    fingerprinter:
      resources:
        requests:
          cpu: "4.5"
          memory: 512Mi
        limits:
          cpu: "4.5"
          memory: 1.5Gi
  fingerprinter-audio:
    enabled: true
    maxReplicaCount: 2
    resources:
      requests:
        cpu: "1500m"
        memory: 2.5Gi
      limits:
        cpu: "1500m"
        memory: 2.5Gi # Safe from OOM Kills
    sideKiqQueue: native_audio_processing_tasks
    activeDeadlineSeconds: 3600 # 1 hour
    fingerprinter:
      resources:
        requests:
          cpu: "4.5"
          memory: 2Gi
        limits:
          cpu: "4.5"
          memory: 2Gi
  # Ingest worker queues converted to scaledJobs (CPU halved from 1 to 0.5 due to concurrency 2->1)
  ingest-proxy-generate:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 1Gi
        cpu: "2"
      limits:
        cpu: "4"
        memory: 2Gi
    sideKiqQueue: proxy_generate_tasks
    activeDeadlineSeconds: 5400 # set to 90mins
  ingest-attach-image:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 0.8Gi
        cpu: "0.5"
      limits:
        cpu: "0.5"
        memory: 0.8Gi
    sideKiqQueue: video_match_frames_attach_image_tasks
    activeDeadlineSeconds: 600
  ingest-process-materials:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 0.8Gi
        cpu: "0.5"
      limits:
        cpu: "0.5"
        memory: 0.8Gi
    sideKiqQueue: process_materials
    activeDeadlineSeconds: 600
  ingest-materials:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 0.8Gi
        cpu: "0.5"
      limits:
        cpu: "0.5"
        memory: 0.8Gi
    sideKiqQueue: ingest_materials
    activeDeadlineSeconds: 600
  ingest-process-qc:
    enabled: true
    maxReplicaCount: 2
    resources:
      requests:
        memory: 0.8Gi
        cpu: "2.0"
      limits:
        cpu: "4.0"
        memory: 3Gi
    sideKiqQueue: process_qc
    activeDeadlineSeconds: 600
  ingest-process-media:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 0.8Gi
        cpu: "0.5"
      limits:
        cpu: "0.5"
        memory: 0.8Gi
    sideKiqQueue: process_media
    activeDeadlineSeconds: 600
  ingest-download-media:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 0.8Gi
        cpu: "0.5"
      limits:
        cpu: "0.5"
        memory: 0.8Gi
    sideKiqQueue: download_media
    activeDeadlineSeconds: 600
  # Audiomatchfingerprint worker queue converted to scaledJob (concurrency 1, resources unchanged)
  audiomatch-fingerprint:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 5500Mi  # p95 over 7d (was 6Gi == limit)
        cpu: "1"        # p95 over 7d (was 1.5 == limit)
      limits:
        cpu: "1.5"
        memory: 8Gi     # raised from 6Gi; peak was 5.88 GiB (98% of old limit), OOMKills likely
    sideKiqQueue: audio_match_frames_fingerprint_tasks
    activeDeadlineSeconds: 14400 # set to 4h; audio files up to 180min require ~135min processing time
  # Compare worker queue converted to scaledJob (concurrency 1, resources unchanged)
  compare-relate:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 1Gi
        cpu: "0.5"
      limits:
        cpu: "0.5"
        memory: 1Gi
    sideKiqQueue: relate_materials
    activeDeadlineSeconds: 600
  # Process worker queues converted to scaledJobs (CPU halved from 1.5 to 0.75 due to concurrency 2->1)
  process-complete-materials:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 2Gi
        cpu: "0.75"
      limits:
        cpu: "0.75"
        memory: 2Gi
    sideKiqQueue: complete_materials
    activeDeadlineSeconds: 600
  process-compare-results:
    enabled: true
    maxReplicaCount: 5
