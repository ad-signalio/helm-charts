####
# Environment-Specific Scaling Overrides (Large - 3x)
#
# This file overrides ONLY the maxReplicaCount for each scaledJob and scaledObject.
# All other configuration (resources, queues, timeouts, fingerprinter sidecars, etc.)
# is defined in values.yaml and inherited via Helm's deep merge.
#
# Helm deep merges these values with values.yaml when you use multiple -f flags:
#   helm install ... --values values.yaml -f environment-sizes/large/large.yaml
#
# Only the specific fields defined here (maxReplicaCount) override the base values.
# All other fields from values.yaml are preserved.
#
# Sizing multipliers across environments:
# - small.yaml: 1x (baseline)
# - medium.yaml: 2x (double the baseline)
# - large.yaml: 3x (these values - triple the baseline)
####
scaledObjects:
  generic:
    maxReplicaCount: 9

scaledJobs:
  fingerprinter-video:
    maxReplicaCount: 6
  fingerprinter-audio:
    maxReplicaCount: 6
  ingest-proxy-generate:
