rails_env: production
logLevel: info
log_path_mode: "0664"
log_path: /app/log/production.log

# Secret Keys configuration
# Used for Rails session encryption, API authentication, and other cryptographic operations
secretKeys:
  # The application requires three secret keys: apiSecretKeyBase, secretKeyBase, and ingestCredentialEncryptionKey.
  # These can be provided via a Kubernetes secret.
  # Set generate: true to auto-generate these keys (requires Kubernetes cluster access)
  # Set generate: false to use a pre-created secret
  # If you have an existing secret from a previous install, specify it here:
  # Example: create the secret with kubectl
  # kubectl create secret generic match-api-secrets \
  #   --from-literal=api_secret_key_base=YOUR_API_SECRET_KEY_BASE \
  #   --from-literal=secret_key_base=YOUR_SECRET_KEY_BASE \
  #   --from-literal=ingest_credential_encryption_key=YOUR_INGEST_CREDENTIAL_ENCRYPTION_KEY
  secret:
    generate: false
    name: match-api-secrets

storage:
  # This is the shared storage for the application, it is required to be a ReadWriteMany PVC.
  sharedStorage:
    enabled: true
    claimName: "match-shared-storage" # Operator provides a ReadWriteMany PVC for use on all pods.
    storageClassName: "" # Optional storage class name
    size: 100Gi
    annotations: {}
    argoSyncWaveAnnotations:
      argocd.argoproj.io/sync-wave: '-1'

  # Only for use with local chart development
  local:
    enabled: false
    createLocalStorageClass: false
  # This is an emptyDir volume mounted at /tmp.
  # Container entrypoint script creates a directory at `tmpStorage.path` with required permissions
  tmpStorage:
    enabled: true
    path: /tmp/app_tmp # Must exist in /tmp.  Created by the entrypoint with the AP_SIGNAL_TMPDIR variable
    # Optionally you can set a limit on the size of emptyDir, but the application may need to store
    # large files in /tmp so this should be suitable for the size of content the system is processing.
    #sizeLimit: 200Gi

# Any additional file systems that contain content, or secrets required by the application may be mounted here
# These are mounted on all pods, so PVCs must be ReadOnlyMany
volumes: []
    #- name: content-location
    #  persistentVolumeClaim:
    #    claimName: "content-pvc" # A PVC on the cluster that contains content to be processed by the application.
    #- name: example-password
    #  secret:
    #    secretName: "example-password"
volumeMounts: []
  #- name: content-location
  #  mountPath: "/content
  #- name: example-password
  #  readOnly: true
  #  mountPath: "/etc/example-password"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: "adsignal-match"
fullnameOverride: "adsignal-match"

