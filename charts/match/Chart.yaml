apiVersion: v2
name: adsignal-match
description: Snicket Labs Match Self Hosted
home: https://snicketlabs.io
version: 1.0.7
maintainers:
  - name: Snicket Labs Match
    email: platform@snicketlabs.io
type: application
appVersion: "1.0.0"

dependencies:
  - name: postgres
    version: 0.5.0
    repository: oci://registry-1.docker.io/cloudpirates
    condition: postgres.enabled
  - name: redis
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.3.3
    condition: redis.enabled
  - name: kube-prometheus-stack
    version: 78.4.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.enabled
  - name: loki-stack
    version: 2.10.2
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.logging.enabled
