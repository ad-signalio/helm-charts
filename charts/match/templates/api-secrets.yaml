{{- include "match.validateArgoSecretGeneration" . }}
{{- if .Values.secretKeys.secret.generate }}
{{- $secretName := .Values.secretKeys.secret.name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "match.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-3"
type: Opaque
data:
  api_secret_key_base: {{ include "match.apiSecretKeyBase" . | b64enc | quote }}
  secret_key_base: {{ include "match.secretKeyBase" . | b64enc | quote }}
  ingest_credential_encryption_key: {{ include "match.ingestCredentialEncryptionKey" . | b64enc | quote }}
{{- else }}
{{/* Secret exists, validate required keys are present */}}
{{- if not (index $existingSecret.data "api_secret_key_base") }}
{{- fail (printf "Secret %s exists but is missing required key 'api_secret_key_base'. Please add this key to the secret." $secretName) }}
{{- end }}
{{- if not (index $existingSecret.data "secret_key_base") }}
{{- fail (printf "Secret %s exists but is missing required key 'secret_key_base'. Please add this key to the secret." $secretName) }}
{{- end }}
{{- if not (index $existingSecret.data "ingest_credential_encryption_key") }}
{{- fail (printf "Secret %s exists but is missing required key 'ingest_credential_encryption_key'. Please add this key to the secret." $secretName) }}
{{- end }}
{{- end }}
{{- end }}
