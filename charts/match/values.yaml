      requests:
        memory: 2Gi
        cpu: "0.75"
      limits:
        cpu: "0.75"
        memory: 2Gi
    sideKiqQueue: compare_materials_results
    activeDeadlineSeconds: 600
  process-audio-insights:
    enabled: true
    maxReplicaCount: 5
    resources:
      requests:
        memory: 2Gi
        cpu: "0.75"
      limits:
        cpu: "0.75"
